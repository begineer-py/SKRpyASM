# ===== AttackPlan =====

query GetAttackPlans(
  $where: core_attackplan_bool_exp
  $orderBy: [core_attackplan_order_by!]
  $limit: Int
  $offset: Int
) {
  core_attackplan(
    where: $where
    order_by: $orderBy
    limit: $limit
    offset: $offset
  ) {
    id
    target_id
    thread_id
    objective
    scope
    status
    parent_plan_id
    created_at
    updated_at
  }
  core_attackplan_aggregate(where: $where) {
    aggregate {
      count
    }
  }
}

query GetAttackPlan($id: bigint!) {
  core_attackplan_by_pk(id: $id) {
    id
    target_id
    thread_id
    objective
    scope
    status
    parent_plan_id
    created_at
    updated_at
    core_actions(order_by: { order: asc }) {
      id
      target_id
      plan_id
      purpose
      purpose_text
      status
      agent_thread_id
      agent_role
      execution_graph_id
      result_summary
      order
      created_at
      started_at
      completed_at
    }
  }
}

mutation CreateAttackPlan($object: core_attackplan_insert_input!) {
  insert_core_attackplan_one(object: $object) {
    id
    target_id
    thread_id
    objective
    scope
    status
    parent_plan_id
    created_at
    updated_at
  }
}

mutation UpdateAttackPlan($id: bigint!, $updates: core_attackplan_set_input!) {
  update_core_attackplan_by_pk(pk_columns: { id: $id }, _set: $updates) {
    id
    target_id
    thread_id
    objective
    scope
    status
    parent_plan_id
    created_at
    updated_at
  }
}

