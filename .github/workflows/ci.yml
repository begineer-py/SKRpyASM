name: C2-ASM CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-bullseye
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: 檢出代碼
      uses: actions/checkout@v4

    - name: 設置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安裝核心依賴
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 驗證資料庫遷移與應用狀態
      env:
        POSTGRES_DB: mydb
        POSTGRES_USER: myuser
        POSTGRES_PASSWORD: secret
        POSTGRES_HOST: localhost
        DJANGO_SECRET_KEY: ci-test-key-not-for-production
      run: |
        python manage.py check
        python manage.py migrate

    - name: 執行單元測試
      env:
        POSTGRES_DB: mydb
        POSTGRES_USER: myuser
        POSTGRES_PASSWORD: secret
        POSTGRES_HOST: localhost
        DJANGO_SECRET_KEY: ci-test-key-not-for-production
      run: |
        python manage.py test

  frontend:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出代碼
      uses: actions/checkout@v4

    - name: 設置 Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 安裝前端依賴
      run: npm ci
      working-directory: frontend

    - name: 執行 Lint 檢查
      run: npm run lint
      working-directory: frontend

    - name: 執行前端建置
      run: npm run build
      working-directory: frontend
