# 共用後端建置區塊（django / celery_worker / celery_beat 共用同一個 Dockerfile）
x-backend-build: &backend-build
  context: ..          # 項目根目錄（Dockerfile 所在位置）
  dockerfile: Dockerfile

services:
  postgres:
    image: postgres:14-bullseye
    container_name: postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_user_db.sh:/docker-entrypoint-initdb.d/setup_user_db.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - c2_network

  redis:
    image: redis:8.0
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - c2_network

  # --- 新增：Hasura GraphQL 引擎 (你的新 API) ---
  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: hasura
    ports:
      - "127.0.0.1:8085:8080"
    depends_on:
      - postgres # 確保 Postgres 先啟動
    restart: unless-stopped
    environment:
      # 1. 連接你的 Postgres
      # 格式: postgres://[USER]:[PASSWORD]@[SERVICE_NAME]:[PORT]/[DB_NAME]
      HASURA_GRAPHQL_DATABASE_URL: postgres://myuser:secret@postgres:5432/mydb

      # 2. 開啟 Web Console
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"

      # 3. 設置你的管理員密鑰 (極度重要)
      HASURA_GRAPHQL_ADMIN_SECRET: "YourSuperStrongAdminSecretHere" # <-- 務必修改

      # (可選) 開啟開發模式，方便調試
      HASURA_GRAPHQL_DEV_MODE: "true"
    networks:
      - c2_network

  # --- 新增：NocoDB (你的新 Admin 後台) ---
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      # --- 使用這個更明確、更穩定的分段配置 ---
      NC_DB_TYPE: pg # 告訴 NocoDB 我們用的是 Postgres
      NC_PG_HOST: postgres # 連接到 Docker 服務名
      NC_PG_PORT: 5432
      NC_PG_USER: myuser
      NC_PG_PASSWORD: secret
      NC_PG_DATABASE: mydb

      NC_DISABLE_TELE: "true"
    volumes:
      - nocodb_data:/usr/app/data
    networks:
      - c2_network

  # --- 你現有的 WAF 繞過工具鏈 (保留) ---
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      - LOG_LEVEL=DEBUG
      - MAX_SESSIONS=10
    restart: unless-stopped
    networks:
      - c2_network

  flareproxygo:
    image: ghcr.io/kljensen/flareproxygo:latest
    container_name: flareproxygo
    ports:
      - "127.0.0.1:8192:8080"
      - "127.0.0.1:1337:1337"
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - PORT=8080
      - DEBUG=true
      - PROXY_PORT=1337
    depends_on:
      - flaresolverr
    restart: unless-stopped
    networks:
      - c2_network

  # --- 新增：Kali Linux Sandbox (AI Skill 執行沙盒) ---
  c2_kali_sandbox:
    build: ./kali_sandbox
    container_name: c2_kali_sandbox
    restart: always
    # Use bridge network instead of host mode for security
    # Sandbox can still scan internal services via Docker DNS (service names)
    # For localhost scanning, use host.docker.internal (Docker Desktop) or host network gateway
    networks:
      - c2_network
    # Minimal capabilities required for nmap and bubblewrap
    cap_add:
      - NET_RAW     # Required for nmap -sS (SYN scan) and raw socket operations
      - NET_ADMIN   # Required for nmap OS detection and advanced scanning
    # SYS_ADMIN removed - bubblewrap pivot_root works without it in newer kernels
    # AppArmor/seccomp unconfined removed - use default profiles for defense in depth
    # If bwrap pivot_root fails, consider --unshare-all without pivot_root
    security_opt:
      - seccomp:unconfined  # Required for bubblewrap pivot_root (keep minimal)
    volumes:
      - /tmp/c2_sandbox_scripts:/scripthub
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
    # Run as non-root user (defined in Dockerfile)
    # user: "sandbox:sandbox"  # Uncomment after verifying bwrap works as non-root

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: c2_nginx
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      django:
        condition: service_healthy
      hasura:
        condition: service_started
    restart: unless-stopped
    networks:
      - c2_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Django Application（Uvicorn ASGI）─────────────────────
  django:
    build: *backend-build
    image: docker-django:fixed   # 使用含 docker CLI + 程式碼修復的固化映像
    container_name: c2_django
    # Run as root for migrations and docker.sock access
    user: "root"
    command:
      - sh
      - -c
      - python manage.py migrate --noinput && python manage.py setup_beat_schedules && exec uvicorn c2_core.asgi:application --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http httptools
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env            # 單一來源（從 .env.example 複製後填寫）
    environment:
      # Docker 服務拓樸（覆寫 .env / settings.py 的 localhost 預設值）
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      API_BASE_URL: http://django:8000
      INTERNAL_API_BASE_URL: http://django:8000/api
      # FlareSolverr 在 docker network 中要用 service name，不能用 127.0.0.1
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - c2_logs:/app/c2_core/logs
      - /var/run/docker.sock:/var/run/docker.sock  # 讓 django 也能呼叫 host daemon（httpx 等工具）
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/openapi.json',timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - c2_network

  # ── Celery Worker ─────────────────────────────────────────
  celery_worker:
    build: *backend-build
    image: docker-celery_worker:fixed   # 使用含 docker CLI + 程式碼修復的固化映像
    container_name: c2_celery_worker
    # Run as root for docker.sock access, tasks can drop privileges if needed
    command: celery -A c2_core worker -P prefork -c 8 -l info
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # FlareSolverr 在 docker network 中要用 service name，不能用 127.0.0.1
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    volumes:
      - c2_logs:/app/c2_core/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/c2_sandbox_scripts:/scripthub
    restart: unless-stopped
    healthcheck:
      # $$HOSTNAME: Compose 內插 $$ -> $，再由容器 shell 展開 $HOSTNAME
      test: ["CMD-SHELL", "celery -A c2_core inspect ping -d celery@$$HOSTNAME -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - c2_network

  # ── Celery Beat Scheduler ─────────────────────────────────
  celery_beat:
    build: *backend-build
    image: docker-celery_beat:fixed   # 使用含 docker CLI + 程式碼修復的固化映像
    container_name: c2_celery_beat
    command: celery -A c2_core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      API_BASE_URL: http://django:8000
      INTERNAL_API_BASE_URL: http://django:8000/api
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_healthy
    volumes:
      - c2_logs:/app/c2_core/logs
    restart: unless-stopped
    networks:
      - c2_network

volumes:
  postgres_data:
  nocodb_data: # 新增 NocoDB 持久化卷
  c2_logs:

networks:
  c2_network:
    driver: bridge
    name: c2_network
